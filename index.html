<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=ui-panorama/">
    <title>Free Parking - Select UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: white;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .ui-card {
            display: block;
            padding: 30px;
            margin: 20px 0;
            background: white;
            text-decoration: none;
            color: #333;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .ui-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            background: #f8f9fa;
        }
        .ui-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .ui-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .ui-description {
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Free Parking Detection</h1>

        <a href="ui-panorama/" class="ui-card">
            <div class="ui-icon">🔭</div>
            <div class="ui-title">Panorama Detection</div>
            <div class="ui-description">Explore Street View panoramas and detect parking signs in real-time</div>
        </a>

        <a href="ui-map/" class="ui-card">
            <div class="ui-icon">📍</div>
            <div class="ui-title">Map & Street View Detection</div>
            <div class="ui-description">Select an area on the map to detect parking signs using Street View imagery</div>
        </a>

        <a href="ui-upload/out/" class="ui-card">
            <div class="ui-icon">📤</div>
            <div class="ui-title">Image Upload Detection</div>
            <div class="ui-description">Upload images or provide URLs to detect parking signs</div>
        </a>
    </div>
</body>
</html>
