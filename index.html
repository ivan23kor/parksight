<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Street View Driver Perspective</title>
    <link
      rel="icon"
      href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="12" fill="%23111827"/%3E%3Cpath d="M28 10h8v18h12v8H36v18h-8V36H16v-8h12z" fill="%2322c55e"/%3E%3C/svg%3E'
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        background: #111827;
      }

      #splitLayout {
        display: flex;
        width: 100%;
        height: 100%;
      }

      #panoramaPane,
      #mapPane {
        position: relative;
        width: 50%;
        height: 100%;
        min-width: 0;
      }

      #panoramaPane {
        background: #000;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }

      #mapPane {
        background: #f3f4f6;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      button {
        background: #007cba;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        margin-right: 10px;
      }

      button:hover {
        background: #005a87;
      }

      #detectionButtons {
        position: absolute;
        bottom: 56px;
        left: 20px;
        z-index: 101;
        display: flex;
        gap: 6px;
        max-width: calc(100% - 32px);
      }

      #detectionButtons button {
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        user-select: none;
        transition: background 0.2s ease;
        white-space: nowrap;
      }

      #detectionButtons button:hover {
        background: rgba(0, 0, 0, 0.9);
      }

      #detectionButtons button:active {
        background: rgba(30, 64, 175, 0.9);
      }

      #detectionButtons button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #detectionPanorama {
        width: 100%;
        height: 100%;
        position: relative;
        transition: opacity 0.2s ease;
      }

      #panoramaPane.panorama-blackout-active #detectionPanorama {
        opacity: 0;
      }

      #togglePanoramaBackgroundBtn {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 2002;
        margin: 0;
        background: rgba(17, 24, 39, 0.92);
        color: #f9fafb;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        line-height: 1.2;
      }

      #togglePanoramaBackgroundBtn:hover {
        background: rgba(31, 41, 55, 0.96);
      }

      #detectionOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }

      .detection-box {
        position: absolute;
        border: 3px solid;
        box-sizing: border-box;
        pointer-events: none;
      }

      .detection-label {
        position: absolute;
        top: -22px;
        left: 0;
        padding: 2px 6px;
        font-size: 12px;
        font-weight: bold;
        color: white;
        white-space: nowrap;
        border-radius: 2px;
      }

      #detectionStatus {
        position: absolute;
        bottom: 100px;
        left: 20px;
        color: white;
        font-size: 13px;
        background: rgba(0, 0, 0, 0.6);
        padding: 6px 12px;
        border-radius: 4px;
        z-index: 101;
        max-width: calc(100% - 32px);
        pointer-events: none;
      }

      .sign-marker-icon {
        font-size: 20px;
        line-height: 24px;
        text-align: center;
        background: none;
        border: none;
      }

      #detectionInfo {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        z-index: 101;
      }

      #clearProjectedSignsBtn {
        position: absolute;
        right: 10px;
        bottom: 10px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.94);
        color: #111;
        padding: 10px 14px;
        border-radius: 6px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
        font-size: 13px;
        line-height: 1;
        border: none;
        cursor: pointer;
      }

      #clearProjectedSignsBtn:hover {
        background: #fff;
      }

      .ocr-tooltip {
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        border: none;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.4;
        padding: 3px 6px;
        white-space: pre-line;
        border-radius: 4px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      }
      .ocr-tooltip::before {
        border-top-color: rgba(0, 0, 0, 0.8);
      }

      .sign-preview-popup {
        min-width: 180px;
      }

      .sign-preview-popup img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 6px;
        margin-bottom: 8px;
        background: #f3f4f6;
      }

      .sign-info {
        display: flex;
        justify-content: space-between;
        font-family: monospace;
        font-size: 11px;
        color: #4b5563;
        padding-top: 4px;
        border-top: 1px solid #e5e7eb;
      }

      .sign-preview-popup .preview-loading,
      .sign-preview-popup .preview-error {
        color: #4b5563;
        font-size: 13px;
        line-height: 1.4;
      }

      #cropAbModal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 3000;
        background: rgba(0, 0, 0, 0.7);
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      #cropAbModal.visible {
        display: flex;
      }

      #cropAbModal .crop-ab-content {
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        max-width: 90vw;
        max-height: 90vh;
        overflow: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      #cropAbModal .crop-ab-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #111;
      }

      #cropAbModal .crop-ab-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        margin-bottom: 16px;
      }

      #cropAbModal .crop-ab-cell {
        text-align: center;
      }

      #cropAbModal .crop-ab-cell h4 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 8px 0;
        color: #333;
      }

      #cropAbModal .crop-ab-cell img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
      }

      #cropAbModal .crop-ab-cell .crop-ab-meta {
        font-size: 12px;
        color: #6b7280;
        margin-top: 6px;
      }

      #cropAbModal .crop-ab-cell .crop-ab-error {
        color: #dc2626;
        font-size: 13px;
      }

      #cropAbModal .crop-ab-close {
        display: block;
        margin: 0 auto;
        padding: 10px 24px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }

      #cropAbModal .crop-ab-close:hover {
        background: #2563eb;
      }

      @media (max-width: 900px) {
        #splitLayout {
          flex-direction: column;
        }

        #panoramaPane,
        #mapPane {
          width: 100%;
          height: 50%;
        }

        #panoramaPane {
          border-right: none;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
      }
    </style>

  <body>
    <div id="splitLayout">
      <section id="panoramaPane" aria-label="Street View panorama">
        <button id="togglePanoramaBackgroundBtn" type="button">
          Black background
        </button>
        <div id="detectionPanorama"></div>
        <svg id="detectionOverlay"></svg>
        <div id="detectionStatus"></div>
        <div id="detectionButtons">
          <button id="detectSingleBtn">Detect (single)</button>
          <button id="detectSahiBtn">Detect (SAHI)</button>
        </div>
        <div id="detectionInfo"></div>
      </section>

      <section id="mapPane" aria-label="Map view">
        <div id="map"></div>
        <button id="clearProjectedSignsBtn" type="button">
          Clear projected signs
        </button>
      </section>
    </div>

    <pre id="parksight-dump" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;margin:0;padding:20px;background:rgba(0,0,0,0.95);color:#4ade80;font-size:12px;overflow:auto;white-space:pre-wrap;word-break:break-all;cursor:pointer" onclick="this.style.display='none'"></pre>

    <div id="cropAbModal" aria-label="Crop A/B comparison">
      <div class="crop-ab-content">
        <div class="crop-ab-title">Crop comparison: Tiles vs Static API</div>
        <div class="crop-ab-grid">
          <div class="crop-ab-cell" id="cropAbTiles">
            <h4>Tiles (current)</h4>
            <div id="cropAbTilesImg"></div>
            <div class="crop-ab-meta" id="cropAbTilesMeta"></div>
          </div>
          <div class="crop-ab-cell" id="cropAbStatic">
            <h4>Static API (new)</h4>
            <div id="cropAbStaticImg"></div>
            <div class="crop-ab-meta" id="cropAbStaticMeta"></div>
          </div>
        </div>
        <button type="button" class="crop-ab-close" id="cropAbClose">Close</button>
      </div>
    </div>

    <!-- External Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

    <!-- Config and Modules -->
    <script src="env.js"></script>
    <script src="config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/streets.js"></script>
    <script src="js/panorama.js"></script>
    <script src="js/streetview.js"></script>
    <script src="js/detection.js"></script>

    <!-- Google Maps API (loaded after config.js so we have the API key) -->
    <script>
      // Load Google Maps API dynamically
      (function loadGoogleMapsAPI() {
        const apiKey = window.GOOGLE_CONFIG?.API_KEY;
        if (!apiKey) {
          console.error("Google API key not configured");
          return;
        }
        const script = document.createElement("script");
        script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initApp&loading=async`;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
      })();
    </script>

    <script>
      // Global state
      let map;
      let signMarkersLayer;
      let ruleCurvesLayer;
      let panoramaCaptureSpotsLayer;
      let isPanoramaBlackoutEnabled = false;
      let panoramaCaptureSpotsSyncToken = 0;

      // Store point data for detection context
      let currentPoints = [];
      let currentPanoIds = [];
      let latestRenderedSignMapData = null;
      const SIGN_MAP_STORAGE_KEY = "parksight_latest_sign_map_data";
      const SIGN_MAP_PROJECTION_VERSION = 6;
      const INITIAL_LOCATION = { lat: 42.3615, lon: -71.0921 };
      const DEFAULT_SIDE = "right";
      const BASE_HEADING = 90;
      const PREVIEW_ALT_MIN_DISTANCE_METERS = 2.5;
      const PREVIEW_ALT_MAX_DISTANCE_METERS = 80;
      const PREVIEW_ALT_IMPROVEMENT_RATIO = 0.92;
      const PREVIEW_REFINEMENT_FOV_MIN = 18;
      const PREVIEW_REFINEMENT_FOV_MAX = 40;
      const DETECTION_ROAD_MARKER_HALF_LENGTH_METERS = 36;
      const PANORAMA_CAPTURE_SPOT_MAX_LINKS = 8;

      function normalizeSignMapStore(parsed) {
        if (!parsed) {
          return {
            savedAt: null,
            source: "none",
            projectionVersion: SIGN_MAP_PROJECTION_VERSION,
            detections: [],
          };
        }

        if (parsed.projectionVersion !== SIGN_MAP_PROJECTION_VERSION) {
          return {
            savedAt: null,
            source: "none",
            projectionVersion: SIGN_MAP_PROJECTION_VERSION,
            detections: [],
          };
        }

        if (Array.isArray(parsed.detections)) {
          return {
            savedAt: parsed.savedAt || null,
            source: parsed.source || "unknown",
            projectionVersion: SIGN_MAP_PROJECTION_VERSION,
            detections: parsed.detections.filter(Boolean),
          };
        }

        if (parsed.camera) {
          return {
            savedAt: parsed.savedAt || null,
            source: parsed.source || "unknown",
            projectionVersion: SIGN_MAP_PROJECTION_VERSION,
            detections: [parsed],
          };
        }

        return {
          savedAt: null,
          source: "unknown",
          projectionVersion: SIGN_MAP_PROJECTION_VERSION,
          detections: [],
        };
      }

      function getLatestSignMapData() {
        const raw = localStorage.getItem(SIGN_MAP_STORAGE_KEY);
        if (!raw) return normalizeSignMapStore(null);

        try {
          return normalizeSignMapStore(JSON.parse(raw));
        } catch (err) {
          console.error("Failed to parse persisted sign map data:", err);
          return normalizeSignMapStore(null);
        }
      }

      function persistLatestSignMapData(data) {
        localStorage.setItem(SIGN_MAP_STORAGE_KEY, JSON.stringify(data));
      }

      function appendSignMapDetection(detectionEntry) {
        const store = getLatestSignMapData();
        const sameDetection = (candidate) => {
          if (!candidate || !detectionEntry) return false;

          if (candidate.panoId && detectionEntry.panoId) {
            return candidate.panoId === detectionEntry.panoId;
          }

          if (!candidate.camera || !detectionEntry.camera) {
            return false;
          }

          return (
            Math.abs(candidate.camera.lat - detectionEntry.camera.lat) < 1e-7 &&
            Math.abs(candidate.camera.lng - detectionEntry.camera.lng) < 1e-7
          );
        };

        const nextStore = {
          savedAt: Date.now(),
          source: detectionEntry.source || store.source || "parksight",
          projectionVersion: SIGN_MAP_PROJECTION_VERSION,
          detections: [
            ...store.detections.filter((existing) => !sameDetection(existing)),
            detectionEntry,
          ],
        };
        persistLatestSignMapData(nextStore);
        return nextStore;
      }

      function clearProjectedSigns() {
        latestRenderedSignMapData = normalizeSignMapStore(null);
        localStorage.removeItem(SIGN_MAP_STORAGE_KEY);
        signMarkersLayer.clearLayers();
        ruleCurvesLayer.clearLayers();
      }

      function clearPanoramaCaptureSpots() {
        panoramaCaptureSpotsLayer?.clearLayers();
      }

      function renderPanoramaCaptureSpotsOnMap(currentSpot, linkedSpots) {
        if (!panoramaCaptureSpotsLayer) return;
        panoramaCaptureSpotsLayer.clearLayers();

        if (
          !currentSpot ||
          !Number.isFinite(currentSpot.lat) ||
          !Number.isFinite(currentSpot.lng)
        ) {
          return;
        }

        const currentMarker = L.circleMarker([currentSpot.lat, currentSpot.lng], {
          radius: 6,
          color: "#1d4ed8",
          fillColor: "#60a5fa",
          weight: 2,
          opacity: 0.95,
          fillOpacity: 0.85,
        }).addTo(panoramaCaptureSpotsLayer);
        currentMarker.bindPopup(
          `<b>Current panorama</b><br>Pano: ${currentSpot.panoId || "unknown"}`,
        );

        for (const spot of linkedSpots || []) {
          if (!Number.isFinite(spot.lat) || !Number.isFinite(spot.lng) || !spot.panoId) {
            continue;
          }

          const spotMarker = L.circleMarker([spot.lat, spot.lng], {
            radius: 5,
            color: "#4b5563",
            fillColor: "#9ca3af",
            weight: 2,
            opacity: 0.95,
            fillOpacity: 0.9,
          }).addTo(panoramaCaptureSpotsLayer);

          const spotHeading = Number.isFinite(spot.heading)
            ? Math.round(normalizeBearingDegrees(spot.heading))
            : null;
          spotMarker.bindPopup(
            `<b>Linked panorama</b><br>` +
              `Pano: ${spot.panoId}<br>` +
              `${spot.description || "No description"}<br>` +
              `${spotHeading != null ? `Heading: ${spotHeading}°` : ""}`,
          );

          spotMarker.on("click", () => {
            currentDetectionContext = {
              ...currentDetectionContext,
              panoId: spot.panoId,
              heading: Number.isFinite(spot.heading)
                ? normalizeBearingDegrees(spot.heading)
                : currentDetectionContext?.heading ?? BASE_HEADING,
              pointIndex: null,
              streetName:
                spot.description ||
                currentDetectionContext?.streetName ||
                "Unknown street",
            };
            initPanoramaForContext();
          });
        }
      }

      async function fetchLinkedPanoramaCaptureSpots(links) {
        const svService = new google.maps.StreetViewService();
        const uniqueLinks = [];
        const seen = new Set();

        for (const link of links || []) {
          if (!link?.pano || seen.has(link.pano)) continue;
          seen.add(link.pano);
          uniqueLinks.push(link);
        }

        const limitedLinks = uniqueLinks.slice(0, PANORAMA_CAPTURE_SPOT_MAX_LINKS);
        const settled = await Promise.allSettled(
          limitedLinks.map(async (link) => {
            const response = await svService.getPanorama({ pano: link.pano });
            const latLng = response?.data?.location?.latLng;
            if (!latLng) {
              return null;
            }

            return {
              panoId: link.pano,
              lat: latLng.lat(),
              lng: latLng.lng(),
              heading: link.heading,
              description: link.description || "",
            };
          }),
        );

        return settled
          .filter((result) => result.status === "fulfilled" && result.value)
          .map((result) => result.value);
      }

      window.syncPanoramaCaptureSpotsOnMap = async function () {
        const syncToken = ++panoramaCaptureSpotsSyncToken;
        if (!panoramaCaptureSpotsLayer || !detectionPanorama) {
          clearPanoramaCaptureSpots();
          return;
        }

        try {
          const panoId = detectionPanorama.getPano?.();
          const position = detectionPanorama.getPosition?.();
          const currentLat = position?.lat?.();
          const currentLng = position?.lng?.();
          if (!panoId || !Number.isFinite(currentLat) || !Number.isFinite(currentLng)) {
            clearPanoramaCaptureSpots();
            return;
          }

          const links = detectionPanorama.getLinks?.() || [];
          const linkedSpots = await fetchLinkedPanoramaCaptureSpots(links);
          if (syncToken !== panoramaCaptureSpotsSyncToken) {
            return;
          }

          renderPanoramaCaptureSpotsOnMap(
            { panoId, lat: currentLat, lng: currentLng },
            linkedSpots,
          );
        } catch (err) {
          console.warn("Failed to sync panorama capture spots on map:", err);
          if (syncToken === panoramaCaptureSpotsSyncToken) {
            clearPanoramaCaptureSpots();
          }
        }
      };

      function hasDetectionRoadContext(context) {
        if (!context) return false;

        const hasWayGeometry =
          Array.isArray(context.wayGeometry) && context.wayGeometry.length >= 2;
        const hasSegment =
          context.segmentStart &&
          context.segmentEnd &&
          Number.isFinite(context.streetBearing);

        return hasWayGeometry || hasSegment;
      }

      async function ensureDetectionRoadContext(lat, lng, allWays = null) {
        if (
          hasDetectionRoadContext(currentDetectionContext) ||
          !Number.isFinite(lat) ||
          !Number.isFinite(lng)
        ) {
          return currentDetectionContext;
        }

        try {
          const nearestStreet = await fetchNearestStreetContext(lat, lng, allWays);
          if (!nearestStreet) {
            return currentDetectionContext;
          }

          currentDetectionContext = {
            ...currentDetectionContext,
            streetBearing: Number.isFinite(nearestStreet.bearing)
              ? nearestStreet.bearing
              : currentDetectionContext?.streetBearing,
            oneway: nearestStreet.oneway ?? currentDetectionContext?.oneway ?? null,
            highway:
              nearestStreet.highway ?? currentDetectionContext?.highway ?? null,
            lanes: nearestStreet.lanes ?? currentDetectionContext?.lanes ?? null,
            segmentStart:
              nearestStreet.segmentStart ||
              currentDetectionContext?.segmentStart ||
              null,
            segmentEnd:
              nearestStreet.segmentEnd || currentDetectionContext?.segmentEnd || null,
            wayGeometry:
              nearestStreet.wayGeometry || currentDetectionContext?.wayGeometry || null,
            segmentIndex:
              nearestStreet.segmentIndex ??
              currentDetectionContext?.segmentIndex ??
              null,
            streetName:
              nearestStreet.streetName ||
              currentDetectionContext?.streetName ||
              "Unknown street",
          };
          updateDetectionInfoText();
        } catch (err) {
          console.warn("Failed to resolve street context for detection:", err);
        }

        return currentDetectionContext;
      }

      function resolveDetectionRoadBearing(detection) {
        const segmentStart = detection?.segmentStart;
        const segmentEnd = detection?.segmentEnd;
        if (segmentStart && segmentEnd) {
          return bearingBetweenPoints(
            segmentStart.lat,
            segmentStart.lon,
            segmentEnd.lat,
            segmentEnd.lon,
          );
        }

        if (Number.isFinite(detection?.streetBearing)) {
          return detection.streetBearing;
        }

        return null;
      }

      function buildDetectionRoadMarkerLatLngs(
        detection,
        halfLengthMeters = DETECTION_ROAD_MARKER_HALF_LENGTH_METERS,
      ) {
        if (!detection?.camera) {
          return null;
        }

        const wayGeo = detection.wayGeometry;
        if (Array.isArray(wayGeo) && wayGeo.length >= 2) {
          return clipWayAroundCamera(
            wayGeo,
            detection.camera.lat,
            detection.camera.lng,
            halfLengthMeters,
          );
        }

        const roadBearing = resolveDetectionRoadBearing(detection);
        console.log("[centerline] fallback bearing:", roadBearing);
        if (!Number.isFinite(roadBearing)) {
          return null;
        }

        const start = projectLatLng(
          detection.camera.lat,
          detection.camera.lng,
          halfLengthMeters,
          normalizeBearingDegrees(roadBearing + 180),
        );
        const end = projectLatLng(
          detection.camera.lat,
          detection.camera.lng,
          halfLengthMeters,
          normalizeBearingDegrees(roadBearing),
        );

        return [
          [start.lat, start.lng],
          [end.lat, end.lng],
        ];
      }

      function clipWayAroundCamera(wayGeo, camLat, camLng, halfLenM) {
        let bestDist = Infinity;
        let bestSegIdx = 0;
        let bestT = 0;

        for (let i = 0; i < wayGeo.length - 1; i++) {
          const a = wayGeo[i];
          const b = wayGeo[i + 1];
          const result = closestPointOnSegment(camLat, camLng, a.lat, a.lon, b.lat, b.lon);
          if (result.dist < bestDist) {
            bestDist = result.dist;
            bestSegIdx = i;
            bestT = result.t;
          }
        }

        const projLat = wayGeo[bestSegIdx].lat + bestT * (wayGeo[bestSegIdx + 1].lat - wayGeo[bestSegIdx].lat);
        const projLon = wayGeo[bestSegIdx].lon + bestT * (wayGeo[bestSegIdx + 1].lon - wayGeo[bestSegIdx].lon);

        const forwardPts = walkAlongWay(wayGeo, bestSegIdx, bestT, projLat, projLon, halfLenM, 1);
        const backwardPts = walkAlongWay(wayGeo, bestSegIdx, bestT, projLat, projLon, halfLenM, -1);

        const result = [];
        for (let i = backwardPts.length - 1; i >= 0; i--) {
          result.push([backwardPts[i].lat, backwardPts[i].lon]);
        }
        result.push([projLat, projLon]);
        for (const p of forwardPts) {
          result.push([p.lat, p.lon]);
        }
        return result;
      }

      function closestPointOnSegment(px, py, ax, ay, bx, by) {
        const dx = bx - ax;
        const dy = by - ay;
        const lenSq = dx * dx + dy * dy;
        if (lenSq < 1e-14) {
          const d = Math.hypot(px - ax, py - ay);
          return { t: 0, dist: d };
        }
        const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
        const cx = ax + t * dx;
        const cy = ay + t * dy;
        return { t, dist: Math.hypot(px - cx, py - cy) };
      }

      function walkAlongWay(wayGeo, segIdx, segT, startLat, startLon, maxMeters, direction) {
        const pts = [];
        let remaining = maxMeters;
        let curLat = startLat;
        let curLon = startLon;
        let idx = segIdx;

        if (direction > 0) {
          const nextNode = wayGeo[idx + 1];
          const d = haversineDistanceMeters(curLat, curLon, nextNode.lat, nextNode.lon);
          if (d <= remaining) {
            pts.push({ lat: nextNode.lat, lon: nextNode.lon });
            remaining -= d;
            curLat = nextNode.lat;
            curLon = nextNode.lon;
            idx++;
          } else {
            const frac = remaining / Math.max(d, 1e-6);
            pts.push({
              lat: curLat + frac * (nextNode.lat - curLat),
              lon: curLon + frac * (nextNode.lon - curLon),
            });
            return pts;
          }

          while (idx < wayGeo.length - 1 && remaining > 0) {
            const next = wayGeo[idx + 1];
            const d2 = haversineDistanceMeters(curLat, curLon, next.lat, next.lon);
            if (d2 <= remaining) {
              pts.push({ lat: next.lat, lon: next.lon });
              remaining -= d2;
              curLat = next.lat;
              curLon = next.lon;
              idx++;
            } else {
              const frac = remaining / Math.max(d2, 1e-6);
              pts.push({
                lat: curLat + frac * (next.lat - curLat),
                lon: curLon + frac * (next.lon - curLon),
              });
              break;
            }
          }
        } else {
          const prevNode = wayGeo[idx];
          const d = haversineDistanceMeters(curLat, curLon, prevNode.lat, prevNode.lon);
          if (d <= remaining) {
            pts.push({ lat: prevNode.lat, lon: prevNode.lon });
            remaining -= d;
            curLat = prevNode.lat;
            curLon = prevNode.lon;
            idx--;
          } else {
            const frac = remaining / Math.max(d, 1e-6);
            pts.push({
              lat: curLat + frac * (prevNode.lat - curLat),
              lon: curLon + frac * (prevNode.lon - curLon),
            });
            return pts;
          }

          while (idx >= 0 && remaining > 0) {
            const prev = wayGeo[idx];
            const d2 = haversineDistanceMeters(curLat, curLon, prev.lat, prev.lon);
            if (d2 <= remaining) {
              pts.push({ lat: prev.lat, lon: prev.lon });
              remaining -= d2;
              curLat = prev.lat;
              curLon = prev.lon;
              idx--;
            } else {
              const frac = remaining / Math.max(d2, 1e-6);
              pts.push({
                lat: curLat + frac * (prev.lat - curLat),
                lon: curLon + frac * (prev.lon - curLon),
              });
              break;
            }
          }
        }

        return pts;
      }

      async function renderSignMapData(data, allWays = null) {
        latestRenderedSignMapData = data;
        signMarkersLayer.clearLayers();

        const detections = data?.detections || [];
        if (detections.length === 0) {

        console.log("Loaded sign map data on parksight:", data);

        const projectedMarkerRadius = 5 / 3;

        detections.forEach((detection, detectionIndex) => {

          const cameraHeading = detection.heading;
          const cameraCircle = L.circle(
            [detection.camera.lat, detection.camera.lng],
            {
              radius: projectedMarkerRadius,
              color: "#1d4ed8",
              fillColor: "#60a5fa",
              weight: 2,
              opacity: 0.95,
              fillOpacity: 0.65,

          ).addTo(signMarkersLayer);

          // Add direction arrow showing panorama heading

            const arrowLat = detection.camera.lat + (arrowLength / 111111) * Math.cos((cameraHeading * Math.PI) / 180);
            const arrowLng = detection.camera.lng + (arrowLength / (111111 * Math.cos((detection.camera.lat * Math.PI) / 180))) * Math.sin((cameraHeading * Math.PI) / 180);
            L.polyline(
              [
                [detection.camera.lat, detection.camera.lng],
                [arrowLat, arrowLng],
              ],
              {
                color: "#1d4ed8",
                weight: 3,
                opacity: 0.95,
              },
            ).addTo(signMarkersLayer);
          }

          // Add dashed road centerline marker
          const roadMarkerLatLngs = buildDetectionRoadMarkerLatLngs(detection);
          if (roadMarkerLatLngs && roadMarkerLatLngs.length >= 2) {
            L.polyline(roadMarkerLatLngs, {
              color: "#f59e0b",

              weight: 3,
              opacity: 0.65,
            }).addTo(signMarkersLayer);

          const signCount = Array.isArray(detection.signs)
            ? detection.signs.length

          for (const sign of detection.signs || []) {

        );

      function buildRulePopupHtml(rule, isTowZone = false) {
        const daysStr = rule.days ? rule.days.map(d => d.toUpperCase()).join(", ") : "Any day";
        const timeStr = rule.time_start && rule.time_end
          ? `${rule.time_start}–${rule.time_end}`
          : "Any time";

        if (isTowZone) {
          return `<div style="padding:4px;">
            <div style="font-weight:600; color:${TOW_ZONE_COLOR}; text-transform:uppercase; font-size:11px;">TOW ZONE</div>
            <div style="font-size:12px; margin-top:4px;">${daysStr}<br/>${timeStr}</div>
            ${rule.additional_text ? `<div style="color:#6b7280; font-size:11px; margin-top:2px;">${rule.additional_text}</div>` : ""}
          </div>`;
        }

        const color = RULE_CATEGORY_COLORS[rule.category] || "#9ca3af";
        const limitStr = rule.time_limit_minutes ? `${rule.time_limit_minutes}min` : "";
        const payStr = rule.payment_required === true ? " (paid)" : rule.payment_required === false ? " (free)" : "";

        return `<div style="padding:4px; border-left:3px solid ${color};">
          <div style="font-weight:600; color:${color}; text-transform:uppercase; font-size:11px;">${rule.category.replace(/_/g, " ")}</div>
          <div style="font-size:12px; margin-top:4px;">${daysStr}<br/>${timeStr} ${limitStr}${payStr}</div>
          ${rule.additional_text ? `<div style="color:#6b7280; font-size:11px; margin-top:2px;">${rule.additional_text}</div>` : ""}
        </div>`;
      }

      const RULE_PRECEDENCE = { loading_zone: 4, permit_required: 3, no_parking: 2, parking_allowed: 1 };

      /**
       * Select the highest-precedence PARKING rule whose arrow direction explicitly matches
       * the target direction. Rules with no arrow (null/"none") are intentionally excluded
       * so they never override rules that have a known direction.
       * Tow zones are handled separately via selectApplicableTowZones().
       *
       * @param {Array} rules - OCR rules array
       * @param {string} targetArrowDir - "left" or "right"
       * @returns {Object|null} - { rule, ruleIndex, precedence } or null
       */
      function selectWinningRuleForArrowDirection(rules, targetArrowDir) {
        const candidates = [];

        (rules || []).forEach((rule, idx) => {
          const arrowDir = rule.arrow_direction;
          // Only include rules with an EXPLICIT matching direction or "both".
          // Rules with no arrow / "none" are skipped — they are ambiguous and
          // must not override rules that carry a known arrow direction.
          if (arrowDir === targetArrowDir || arrowDir === "both") {
            const prec = RULE_PRECEDENCE[rule.category] || 0;
            if (window.DEBUG_RULE_CURVES) {
              console.log(`  [selectWinner:${targetArrowDir}] rule[${idx}] cat=${rule.category} arrow=${arrowDir} prec=${prec} → INCLUDED`);
            }
            candidates.push({ rule, ruleIndex: idx, precedence: prec });
          } else if (window.DEBUG_RULE_CURVES) {
            const reason = (!arrowDir || arrowDir === "none") ? 'no arrow — skipped' : 'wrong arrow';
            console.log(`  [selectWinner:${targetArrowDir}] rule[${idx}] cat=${rule.category} arrow=${arrowDir ?? 'none'} → excluded (${reason})`);
          }
        });

        if (candidates.length === 0) return null;

        candidates.sort((a, b) => b.precedence - a.precedence);
        const winner = candidates[0];
        if (window.DEBUG_RULE_CURVES) {
          console.log(`  [selectWinner:${targetArrowDir}] → winner: ${winner.rule.category} (arrow=${winner.rule.arrow_direction}, prec=${winner.precedence})`);
        }
        return winner;
      }

      /**
       * Return tow zones that apply to a given arrow direction.
       * Tow zones with no arrow are treated as applying everywhere (unlike parking rules).
       * @param {Array} towZones
       * @param {string} targetArrowDir - "left" or "right"
       * @returns {Array}
       */
      function selectApplicableTowZones(towZones, targetArrowDir) {
        return (towZones || []).filter((tz, idx) => {
          const arrowDir = tz.arrow_direction;
          const applies = !arrowDir || arrowDir === "none" || arrowDir === "both" || arrowDir === targetArrowDir;
          if (window.DEBUG_RULE_CURVES) {
            console.log(`  [towZone:${targetArrowDir}] tz[${idx}] arrow=${arrowDir ?? 'none'} → ${applies ? 'INCLUDED' : 'excluded'}`);
          }
          return applies;
        });
      }

      async function renderRuleCurves(data, allWays = null) {
        ruleCurvesLayer.clearLayers();

        // Use preloaded ways when available (passed from the detection flow).
        // Fall back to a fresh Overpass fetch only when loading persisted data
        // cold (e.g. page refresh with stored sign data and no prior detection).
        let renderAllWays = allWays;
        let overpassFailed = false;
        if (!renderAllWays) {
          try {
            renderAllWays = await fetchStreets(map.getBounds());
            console.log(`[renderRuleCurves] Overpass fallback OK: ${renderAllWays.length} ways fetched`);
          } catch (e) {
            renderAllWays = [];
            overpassFailed = true;
            console.warn("renderRuleCurves: fallback Overpass fetch failed", e);
            window.DEBUG_RULE_CURVES = true;
          }
        } else {
          console.log(`[renderRuleCurves] Using ${renderAllWays.length} preloaded ways — no Overpass call needed`);
        }

        // Collect all signs across all detections for distance-to-next-sign lookup
        const allSigns = [];
        for (const detection of data?.detections || []) {
          const wayGeo = detection.wayGeometry;
          for (const sign of detection.signs || []) {
            allSigns.push({
              ...sign,
              wayGeometry: wayGeo || sign.wayGeometry,
              segmentIndex: sign.segmentIndex ?? detection.segmentIndex ?? null,
            });
          }
        }

        // Track rendered curves to avoid duplicates (same sign location + direction)
        const renderedKeys = new Set();
        const SIGN_LOCATION_PRECISION = 4; // ~11m precision for dedup

        // Cache intersection nodes per wayGeometry reference
        const intersectionCache = new Map();
        // Cache extendWayGeometry results keyed by rawWayGeo reference.
        // Ensures all signs sharing the same detection.wayGeometry get the same
        // extended object, keeping intersectionCache hits and streetId matching intact.
        const extendedGeoCache = new Map();

        for (const detection of data?.detections || []) {
          const wayGeometry = detection.wayGeometry;

          for (const sign of detection.signs || []) {
            const ocrResult = sign.ocrResult;
            if (!ocrResult?.is_parking_sign) continue;

            const rawWayGeo = wayGeometry || sign.wayGeometry;
            const signWayGeo = (() => {
              if (extendedGeoCache.has(rawWayGeo)) return extendedGeoCache.get(rawWayGeo);
              const ext = extendWayGeometry(rawWayGeo, renderAllWays, 300, detection.streetName ?? null);
              extendedGeoCache.set(rawWayGeo, ext);
              return ext;
            })();
            const signContext = {
              ...sign,
              wayGeometry: signWayGeo,
              segmentIndex: sign.segmentIndex ?? detection.segmentIndex ?? null,
            };
            let intersectionNodes;
            if (intersectionCache.has(signWayGeo)) {
              intersectionNodes = intersectionCache.get(signWayGeo);
            } else {
              // Include sign's own street in allWays so its nodes match for intersection detection
              const extendedAllWays = Array.isArray(signWayGeo) && signWayGeo.length >= 2
                ? [...renderAllWays, { geometry: signWayGeo, tags: {} }]
                : renderAllWays;
              intersectionNodes =
                Array.isArray(signWayGeo) &&
                signWayGeo.length >= 2 &&
                extendedAllWays.length > 0
                  ? findIntersectionNodes(signWayGeo, extendedAllWays)
                  : [];
              intersectionCache.set(signWayGeo, intersectionNodes);
            }
            console.log(`[renderRuleCurves] sign=(${sign.lat.toFixed(5)},${sign.lng.toFixed(5)}) wayGeo=${signWayGeo?.length ?? 0} nodes, allWays=${renderAllWays.length}, intersections=${intersectionNodes.length}`);
            if (window.DEBUG_RULE_CURVES) console.log('  intersection nodes:', intersectionNodes);
            if (intersectionNodes.length === 0) {
              console.warn(`[renderRuleCurves] ⚠️  0 intersections — curves will stop at wayGeometry endpoint`);
            }
            const signLocKey = `${sign.lat.toFixed(SIGN_LOCATION_PRECISION)},${sign.lng.toFixed(SIGN_LOCATION_PRECISION)}`;

            // Log OCR rules so we can debug color selection
            console.log(`[renderRuleCurves][color] sign=(${sign.lat.toFixed(5)},${sign.lng.toFixed(5)})`, {
              rules: (ocrResult.rules || []).map((r, i) => `[${i}] ${r.category} arrow=${r.arrow_direction ?? 'none'}`),
              tow_zones: (ocrResult.tow_zones || []).map((tz, i) => `[${i}] arrow=${tz.arrow_direction ?? 'none'}`),
            });

            // Select winning parking rule for each explicit arrow direction.
            // No-arrow rules are excluded; tow zones are rendered separately below.
            const leftWinner = selectWinningRuleForArrowDirection(ocrResult.rules, "left");
            const rightWinner = selectWinningRuleForArrowDirection(ocrResult.rules, "right");

            console.log(`[renderRuleCurves][color] → leftWinner=${leftWinner ? `${leftWinner.rule.category} [arrow:${leftWinner.rule.arrow_direction}, prec:${leftWinner.precedence}]` : 'null'}, rightWinner=${rightWinner ? `${rightWinner.rule.category} [arrow:${rightWinner.rule.arrow_direction}, prec:${rightWinner.precedence}]` : 'null'}`, { leftColor: leftWinner ? RULE_CATEGORY_COLORS[leftWinner.rule.category] : null, rightColor: rightWinner ? RULE_CATEGORY_COLORS[rightWinner.rule.category] : null });

            // Helper: trim a latLngs array to the current map viewport
            const trimToViewport = (latLngs) => {
              const mapBounds = map.getBounds();
              let i = 0;
              while (i < latLngs.length && mapBounds.contains(latLngs[i])) i++;
              return i === 0 ? null : latLngs.slice(0, i);
            };

            for (const arrowDir of ["left", "right"]) {
              const winner = arrowDir === "left" ? leftWinner : rightWinner;

              // --- Parking rule curve ---
              if (winner) {
                const curveKey = `${signLocKey}|${arrowDir}`;
                if (!renderedKeys.has(curveKey)) {
                  renderedKeys.add(curveKey);
                  const directions = arrowToAlongStreetDirections(arrowDir, signContext.side);
                  for (const dir of directions) {
                    const maxDist = findDistanceToNextSign(signContext, dir, allSigns, signWayGeo, intersectionNodes);
                    const latLngs = buildRuleCurveLatLngs(signContext, signWayGeo, dir, winner.ruleIndex, maxDist);
                    console.log(`[renderRuleCurves] arrowDir=${arrowDir} dir=${dir} maxDist=${maxDist.toFixed(1)}m pts=${latLngs?.length ?? 0}`);
                    if (!latLngs?.length) continue;
                    const visibleLatLngs = trimToViewport(latLngs);
                    if (!visibleLatLngs) continue;
                    const color = RULE_CATEGORY_COLORS[winner.rule.category] || "#9ca3af";
                    L.polyline(visibleLatLngs, { color, weight: 4, opacity: 0.7 })
                      .bindPopup(buildRulePopupHtml(winner.rule, false))
                      .addTo(ruleCurvesLayer);
                  }
                }
              }

              // --- Tow zone overlay (always drawn separately, dashed red) ---
              const applicableTowZones = selectApplicableTowZones(ocrResult.tow_zones, arrowDir);
              for (const [tzIdx, tz] of applicableTowZones.entries()) {
                const tzKey = `${signLocKey}|tz|${arrowDir}|${tzIdx}`;
                if (renderedKeys.has(tzKey)) continue;
                renderedKeys.add(tzKey);
                const directions = arrowToAlongStreetDirections(arrowDir, signContext.side);
                for (const dir of directions) {
                  const maxDist = findDistanceToNextSign(signContext, dir, allSigns, signWayGeo, intersectionNodes);
                  const latLngs = buildRuleCurveLatLngs(signContext, signWayGeo, dir, tzIdx, maxDist);
                  if (!latLngs?.length) continue;
                  const visibleLatLngs = trimToViewport(latLngs);
                  if (!visibleLatLngs) continue;
                  L.polyline(visibleLatLngs, { color: TOW_ZONE_COLOR, weight: 4, opacity: 0.7, dashArray: "8 6" })
                    .bindPopup(buildRulePopupHtml(tz, true))
                    .addTo(ruleCurvesLayer);
                }
              }
            }
          }
        }
      }

      function createSignPreviewPopupHtml(sign) {
        const previewId = `sign-preview-${Math.random().toString(36).slice(2, 10)}`;
        sign.previewContainerId = previewId;

        return `
                <div class="sign-preview-popup" id="${previewId}">
                    <div class="preview-loading">Loading sign preview...</div>
                </div>
            `;
      }

      function renderSignPreviewContent(container, sign, state) {
        if (state.error) {
          container.innerHTML = `<div class="preview-error">${state.error}</div>`;
          return;
        }

        if (!state.src) {
          container.innerHTML = `<div class="preview-loading">Loading sign preview...</div>`;
          return;
        }

        const signCount = sign.sourceDetections || 1;
        let layoutInfo = "";
        if (signCount > 1) {
          const msf = sign.mergeStackFactor || 0;
          const arrangement = msf > 0.5 ? "vertically stacked" : msf < 0.2 ? "side by side" : "cluster";
          layoutInfo = `<span>${signCount} signs (${arrangement})</span>`;
        }

        // Build OCR section
        let ocrSection = "";
        if (state.ocrLoading) {
          ocrSection = `
            <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb;">
              <div class="preview-loading">Extracting text...</div>
            </div>
          `;
        } else if (state.ocrError) {
          ocrSection = `
            <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb;">
              <div class="preview-error">${state.ocrError}</div>
            </div>
          `;
        } else if (state.ocrResult) {
          const ocrHtml = buildOcrResultHtml(state.ocrResult);
          ocrSection = `
            <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb;">
              ${ocrHtml}
            </div>
          `;
        }

        container.innerHTML = `
          <img src="${state.src}" alt="Detected parking sign preview">
          <div class="sign-info">
            <span>Est: ${sign.distance?.toFixed(1)}m</span>
            ${layoutInfo}
          </div>
          ${ocrSection}
        `;
      }

      function buildOcrResultHtml(ocrResult) {

          return `<div class="preview-error">${ocrResult?.rejection_reason || "Not a parking sign"}</div>`;
        }

        const rulesHtml = (ocrResult.rules || []).map((rule) => {

            : "Any time";

          const payStr = rule.payment_required === true ? "💰" : rule.payment_required === false ? "🆓" : "";
          const arrowStr = rule.arrow_direction && rule.arrow_direction !== "none"
            ? ` ${rule.arrow_direction === "left" ? "←" : rule.arrow_direction === "right" ? "→" : "↔"}`
            : "";

                ${timeStr} ${limitStr} ${payStr}

            </div>

        const towZonesHtml = (ocrResult.tow_zones || []).map((tz) => {

                ${timeStr}
              </div>
              ${tz.additional_text ? `<div style="color: #9ca3af; font-size: 10px; margin-top: 2px;">${tz.additional_text}</div>` : ""}
            </div>
          `;
        }).join("");

        return `
          <div style="font-weight: 600; margin-bottom: 6px; font-size: 12px;">Parking Rules</div>
          ${rulesHtml || "<div style='color: #9ca3af; font-size: 11px;'>No rules extracted</div>"}
          ${towZonesHtml ? `<div style="margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.2);">${towZonesHtml}</div>` : ""}
          ${ocrResult.raw_text ? `<details style="margin-top: 6px;"><summary style="cursor: pointer; color: #9ca3af; font-size: 10px;">Raw text</summary><pre style="margin: 4px 0 0; font-size: 9px; white-space: pre-wrap; color: #d1d5db; word-wrap: break-word;">${ocrResult.raw_text}</pre></details>` : ""}
        `;
      }

      function toRadians(degrees) {
        return (degrees * Math.PI) / 180;
      }

      function haversineDistanceMeters(lat1, lng1, lat2, lng2) {
        const dLat = toRadians(lat2 - lat1);
        const dLng = toRadians(lng2 - lng1);
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRadians(lat1)) *
            Math.cos(toRadians(lat2)) *
            Math.sin(dLng / 2) *
            Math.sin(dLng / 2);
        return (
          2 *
          EARTH_RADIUS_METERS *
          Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))
        );
      }

      function bearingBetweenPoints(lat1, lng1, lat2, lng2) {
        const phi1 = toRadians(lat1);
        const phi2 = toRadians(lat2);
        const lambda = toRadians(lng2 - lng1);
        const y = Math.sin(lambda) * Math.cos(phi2);
        const x =
          Math.cos(phi1) * Math.sin(phi2) -
          Math.sin(phi1) * Math.cos(phi2) * Math.cos(lambda);
        return normalizeBearingDegrees((Math.atan2(y, x) * 180) / Math.PI);
      }

      function estimateAlternatePreviewPitch(sign, candidateDistance) {
        const sourceDistance =
          Number.isFinite(sign.distance) && sign.distance > 0 ? sign.distance : null;

        if (
          sourceDistance &&
          Number.isFinite(sign.pitch) &&
          Math.abs(sign.pitch) > 0.01
        ) {
          const verticalOffsetMeters =
            Math.tan(toRadians(sign.pitch)) * sourceDistance;
          return (
            (Math.atan2(verticalOffsetMeters, candidateDistance) * 180) / Math.PI
          );
        }

        return (
          (Math.atan2(
            -PARKING_SIGN_FACE_HEIGHT_METERS,
            Math.max(candidateDistance, 1),
          ) *
            180) /
          Math.PI
        );
      }

      function choosePreviewViewForSign(sign, fallbackPanoId) {
        if (sign.previewView?.panoId && sign.previewView?.detection) {
          return sign.previewView;
        }

        const sourcePanoId = sign.panoId || fallbackPanoId || null;
        if (!sourcePanoId) {
          return null;
        }

        const sourceDistance =
          Number.isFinite(sign.distance) && sign.distance > 0 ? sign.distance : null;
        const sourceView = {
          panoId: sourcePanoId,
          source: "original",
          candidateDistance: sourceDistance,
          detection: {
            heading: sign.heading,
            pitch: sign.pitch,
            angularWidth: sign.angularWidth,
            angularHeight: sign.angularHeight,
            confidence: sign.confidence,
            class_name: sign.class_name || "parking_sign",
          },
        };

        if (
          !Number.isFinite(sign.lat) ||
          !Number.isFinite(sign.lng) ||
          !Array.isArray(currentPoints) ||
          !Array.isArray(currentPanoIds) ||
          currentPoints.length === 0
        ) {
          sign.previewView = sourceView;
          return sourceView;
        }

        const preferredStreet = currentDetectionContext?.streetName || null;
        let bestCandidate = null;

        for (let i = 0; i < currentPoints.length; i++) {
          const point = currentPoints[i];
          const panoId = currentPanoIds[i];
          const pointLat = point?.lat;
          const pointLng = point?.lon ?? point?.lng;
          if (!panoId || !Number.isFinite(pointLat) || !Number.isFinite(pointLng)) {
            continue;
          }

          const candidateDistance = haversineDistanceMeters(
            pointLat,
            pointLng,
            sign.lat,
            sign.lng,
          );
          if (
            !Number.isFinite(candidateDistance) ||
            candidateDistance < PREVIEW_ALT_MIN_DISTANCE_METERS ||
            candidateDistance > PREVIEW_ALT_MAX_DISTANCE_METERS
          ) {
            continue;
          }

          const sameStreet =
            preferredStreet && point.streetName === preferredStreet;
          const score = candidateDistance - (sameStreet ? 8 : 0);

          if (!bestCandidate || score < bestCandidate.score) {
            const distanceScale =
              sourceDistance && candidateDistance > 0
                ? clamp(sourceDistance / candidateDistance, 1, 12)
                : 1;
            bestCandidate = {
              panoId,
              source: sameStreet ? "nearby-same-street" : "nearby",
              candidateDistance,
              score,
              detection: {
                heading: bearingBetweenPoints(
                  pointLat,
                  pointLng,
                  sign.lat,
                  sign.lng,
                ),
                pitch: estimateAlternatePreviewPitch(sign, candidateDistance),
                angularWidth: sign.angularWidth * distanceScale,
                angularHeight: sign.angularHeight * distanceScale,
                confidence: sign.confidence,
                class_name: sign.class_name || "parking_sign",
              },
            };
          }
        }

        const chosenView =
          bestCandidate &&
          (!sourceDistance ||
            bestCandidate.candidateDistance <
              sourceDistance * PREVIEW_ALT_IMPROVEMENT_RATIO)
            ? bestCandidate
            : sourceView;

        sign.previewView = chosenView;
        sign.previewPanoId = chosenView.panoId;
        sign.previewSource = chosenView.source;
        return chosenView;
      }

      function selectBestRefinedDetection(targetDetection, detections) {
        if (!Array.isArray(detections) || detections.length === 0) {
          return null;
        }

        let best = null;
        let bestScore = Infinity;

        for (const det of detections) {
          if (
            !Number.isFinite(det?.heading) ||
            !Number.isFinite(det?.pitch) ||
            !Number.isFinite(det?.angular_width) ||
            !Number.isFinite(det?.angular_height)
          ) {
            continue;
          }

          const headingDelta = Math.abs(
            signedAngleDeltaDegrees(det.heading, targetDetection.heading),
          );
          const pitchDelta = Math.abs(det.pitch - targetDetection.pitch);
          const widthRatio =
            det.angular_width / Math.max(targetDetection.angularWidth, 0.05);
          const heightRatio =
            det.angular_height / Math.max(targetDetection.angularHeight, 0.05);
          const sizePenalty =
            Math.abs(Math.log(Math.max(widthRatio, 0.05))) +
            Math.abs(Math.log(Math.max(heightRatio, 0.05)));
          const score = headingDelta * 2 + pitchDelta * 1.5 + sizePenalty * 4;

          if (score < bestScore) {
            best = det;
            bestScore = score;
          }
        }

        return best;
      }

      async function refinePreviewViewWithPanoramaDetection(sign, previewView) {
        if (sign.previewRefinedView?.panoId && sign.previewRefinedView?.detection) {
          return sign.previewRefinedView;
        }
        if (sign.previewRefineAttempted || !previewView?.panoId || !previewView?.detection) {
          return null;
        }

        sign.previewRefineAttempted = true;

        try {
          const targetDetection = previewView.detection;
          const refineFov = clamp(
            Math.max(
              targetDetection.angularWidth * 8,
              targetDetection.angularHeight * 6,
              PREVIEW_REFINEMENT_FOV_MIN,
            ),
            PREVIEW_REFINEMENT_FOV_MIN,
            PREVIEW_REFINEMENT_FOV_MAX,
          );
          const result = await runPanoramaDetection(
            previewView.panoId,
            targetDetection.heading,
            targetDetection.pitch,
            refineFov,
            null,
          );
          const refinedMatch = selectBestRefinedDetection(
            targetDetection,
            result?.detections,
          );
          if (!refinedMatch) {
            return null;
          }

          const refinedView = {
            panoId: previewView.panoId,
            source: `${previewView.source}+refined`,
            candidateDistance: previewView.candidateDistance,
            detection: {
              heading: refinedMatch.heading,
              pitch: refinedMatch.pitch,
              angularWidth: refinedMatch.angular_width,
              angularHeight: refinedMatch.angular_height,
              confidence: refinedMatch.confidence,
              class_name: refinedMatch.class_name || "parking_sign",
            },
          };

          sign.previewRefinedView = refinedView;
          sign.previewRefined = true;
          return refinedView;
        } catch (err) {
          console.warn("Preview refinement failed:", err);
          return null;
        }
      }

      async function loadSignPreview(sign, popup) {
        const container = popup
          ?.getElement()
          ?.querySelector(`#${sign.previewContainerId}`);
        if (!container) return;

        // Determine OCR state
        const ocrLoading = !sign.ocrResult;
        const ocrError = sign.ocrError || null;
        const ocrResult = sign.ocrResult || null;

        renderSignPreviewContent(container, sign, {
          src: sign.previewSrc || null,
          error: sign.previewError || null,
          ocrLoading,
          ocrError,
          ocrResult,
        });

        if (
          sign.previewLoading ||
          (sign.previewSrc && (sign.previewRefined || sign.previewRefineAttempted)) ||
          (sign.previewError && !sign.previewSrc)
        ) {
          return;
        }

        if (
          !sign.panoId ||
          !Number.isFinite(sign.heading) ||
          !Number.isFinite(sign.pitch)
        ) {
          sign.previewError = "Preview unavailable for this sign.";
          renderSignPreviewContent(container, sign, {
            error: sign.previewError,
            ocrLoading,
            ocrError,
            ocrResult,
          });
          return;
        }

        sign.previewLoading = true;

        try {
          const previewView = choosePreviewViewForSign(sign, sign.panoId || null);
          const previewPanoId = previewView?.panoId || null;
          if (!previewPanoId || !previewView?.detection) {
            throw new Error("Missing panoId for preview");
          }

          if (!sign.previewSrc) {
            const preview = await fetchDetectionCropPreview(
              previewView.detection,
              previewPanoId,
            );
            sign.previewSrc = preview.src;
            renderSignPreviewContent(container, sign, {
              src: sign.previewSrc,
              ocrLoading,
              ocrError,
              ocrResult,
            });
          }

          const refinedView = await refinePreviewViewWithPanoramaDetection(
            sign,
            previewView,
          );
          if (refinedView?.panoId && refinedView?.detection) {
            const refinedPreview = await fetchDetectionCropPreview(
              refinedView.detection,
              refinedView.panoId,
            );
            sign.previewRefinedSrc = refinedPreview.src;
          }

          if (latestRenderedSignMapData) {
            persistLatestSignMapData(latestRenderedSignMapData);
          }
        } catch (err) {
          console.error("Failed to load sign preview:", err);
          sign.previewError = "Preview unavailable.";
          renderSignPreviewContent(container, sign, {
            error: sign.previewError,
            ocrLoading,
            ocrError,
            ocrResult,
          });
          if (latestRenderedSignMapData) {
            persistLatestSignMapData(latestRenderedSignMapData);
          }
        } finally {
          sign.previewLoading = false;
        }
      }

      async function hydrateDetectionPreviews(signs, panoId) {
        if (!Array.isArray(signs) || signs.length === 0 || !panoId) {
          return signs || [];
        }

        await Promise.allSettled(
          signs.map(async (sign) => {
            sign.panoId = sign.panoId || panoId;
            const previewView = choosePreviewViewForSign(sign, sign.panoId);

            if (
              sign.previewSrc ||
              !previewView?.panoId ||
              !Number.isFinite(previewView?.detection?.heading) ||
              !Number.isFinite(previewView?.detection?.pitch)
            ) {
              return;
            }

            try {
              const preview = await fetchDetectionCropPreview(
                previewView.detection,
                previewView.panoId,
              );
              sign.previewSrc = preview.src;
              delete sign.previewError;
            } catch (err) {
              console.error("Failed to prefetch sign preview:", err);
            }
          }),
        );

        return signs;
      }

      /**
       * Initialize the application after Google Maps API loads.
       */
      async function initApp() {
        // Check API key
        if (!window.GOOGLE_CONFIG?.API_KEY) {
          showError(
            "Google API key not configured. Please add it to config.js",
          );
          return;
        }

        // Initialize Leaflet map
        map = L.map("map", { maxZoom: 19, minZoom: 2 }).setView([42.3615, -71.0921], 16);

        // Add tile layer (OpenStreetMap with street names)
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap contributors",
          maxZoom: 19,
        }).addTo(map);

        // Initialize layers
        signMarkersLayer = L.layerGroup().addTo(map);
        ruleCurvesLayer = L.layerGroup().addTo(map);
        panoramaCaptureSpotsLayer = L.layerGroup().addTo(map);
        debugMapLayer = L.layerGroup().addTo(map);

        // Debug overlay keyboard shortcut (Shift+D)
        document.addEventListener("keydown", (e) => {
          if (e.shiftKey && e.key === "D") {
            e.preventDefault();
            toggleDebugOverlays();
          }
        });

        // Set up event handlers
        setupEventHandlers();

        window.addEventListener("storage", (event) => {
          if (event.key === SIGN_MAP_STORAGE_KEY) {
            renderSignMapData(getLatestSignMapData());
          }
        });

        window.addEventListener("ocr-complete", () => {
          // Attach OCR results from currentDetections to the persisted sign map data
          if (!currentDetections.length || !currentDetections[0]?.ocrResult) return;
          const ocrResult = currentDetections[0].ocrResult;

          const panoId = typeof detectionPanorama?.getPano === "function"
            ? detectionPanorama.getPano()
            : null;
          if (!panoId) return;

          const store = getLatestSignMapData();
          const detection = store.detections.find(d => d.panoId === panoId);
          if (!detection?.signs?.length) return;

          for (const sign of detection.signs) {
            sign.ocrResult = ocrResult;
          }

          const updatedStore = appendSignMapDetection(detection);
          renderSignMapData(updatedStore, _lastAllWays);
        });


        console.log("App initialized");
        setTimeout(() => map.invalidateSize(), 0);
        window.addEventListener("resize", () => {
          map.invalidateSize();
          if (typeof updateDetectionOverlay === "function") {
            updateDetectionOverlay();
          }
          if (typeof updateDetectionInfoText === "function") {
            updateDetectionInfoText();
          }
        });

        await loadDefaultPanorama();
      }

      /**
       * Set up UI event handlers.
       */
      function setupEventHandlers() {
        const panoramaPane = document.getElementById("panoramaPane");
        const togglePanoramaBackgroundBtn = document.getElementById(
          "togglePanoramaBackgroundBtn",
        );

        const syncPanoramaBackgroundToggleUi = () => {
          if (!panoramaPane || !togglePanoramaBackgroundBtn) return;
          panoramaPane.classList.toggle(
            "panorama-blackout-active",
            isPanoramaBlackoutEnabled,
          );
          togglePanoramaBackgroundBtn.textContent = isPanoramaBlackoutEnabled
            ? "Show panorama"
            : "Black background";
          togglePanoramaBackgroundBtn.setAttribute(
            "aria-pressed",
            String(isPanoramaBlackoutEnabled),
          );
        };

        const togglePanoramaBackground = () => {
          isPanoramaBlackoutEnabled = !isPanoramaBlackoutEnabled;
          syncPanoramaBackgroundToggleUi();
        };

        togglePanoramaBackgroundBtn?.addEventListener(
          "click",
          togglePanoramaBackground,
        );
        syncPanoramaBackgroundToggleUi();

        // Detection pane controls
        document
          .getElementById("detectSingleBtn")
          .addEventListener("click", () => rerunDetection("single"));
        document
          .getElementById("detectSahiBtn")
          .addEventListener("click", () => rerunDetection("sahi"));
        document
          .getElementById("clearProjectedSignsBtn")
          .addEventListener("click", clearProjectedSigns);

        // Click map to open closest panorama
        map.on("click", async (e) => {
          const clickLat = e.latlng.lat;
          const clickLng = e.latlng.lng;

          const statusEl = document.getElementById("detectionStatus");
          statusEl.textContent = "Finding nearest Street View...";

          const svService = new google.maps.StreetViewService();
          try {
            const response = await svService.getPanorama({
              location: { lat: clickLat, lng: clickLng },
              radius: 100,
              preference: google.maps.StreetViewPreference.NEAREST,
              source: google.maps.StreetViewSource.OUTDOOR,
            });
            const panoData = response.data;
            if (!panoData?.location?.pano) {
              statusEl.textContent = "No Street View coverage nearby.";
              return;
            }

            const panoId = panoData.location.pano;
            const panoLatLng = panoData.location.latLng;
            const panoLat = panoLatLng.lat();
            const panoLng = panoLatLng.lng();

            // Compute heading from pano position toward the clicked point
            const heading = bearingBetweenPoints(panoLat, panoLng, clickLat, clickLng);

            currentDetectionContext = {
              panoId,
              heading: (calculateHeadingWithSide(heading, DEFAULT_SIDE) + 180) % 360,
              pointIndex: null,
              side: DEFAULT_SIDE,
              streetBearing: heading,
              oneway: null,
              streetName: panoData.location.description || "Unknown street",
            };

            // Fetch road context for better projection (single map-bounds call)
            const allWays = await fetchStreets(map.getBounds()).catch(() => []);
            await ensureDetectionRoadContext(panoLat, panoLng, allWays);
            initPanoramaForContext();
          } catch (err) {
            console.error("Street View lookup failed:", err);
            statusEl.textContent = "No Street View coverage nearby.";
          }
        });
      }

      async function loadDefaultPanorama() {
        const statusEl = document.getElementById("detectionStatus");

        try {
          statusEl.textContent = "Getting session...";
          const session = await getSessionToken();

          statusEl.textContent = "Finding Street View coverage...";
          const panoIds = await fetchPanoIds([INITIAL_LOCATION], session);
          const panoId = panoIds[0];

          if (!panoId) {
            statusEl.textContent =
              "No Street View coverage at the default location.";
            return;
          }

          currentDetectionContext = {
            panoId,
            heading:
              (calculateHeadingWithSide(BASE_HEADING, DEFAULT_SIDE) + 180) %
              360,
            pointIndex: null,
            side: DEFAULT_SIDE,
            streetBearing: BASE_HEADING,
            oneway: null,
            streetName: "34 Vassar St",
          };

          initPanoramaForContext();
        } catch (err) {
          console.error("Default panorama init failed:", err);
          statusEl.textContent = "Failed to load default panorama.";
        }
      }

      // Store current detection context
      let currentDetectionContext = null;
      // Cached allWays from the last detection run; reused by ocr-complete re-render
      let _lastAllWays = null;

      function updateDetectionInfoText() {
        const infoEl = document.getElementById("detectionInfo");
        if (!infoEl) return;

        if (!currentDetectionContext) {
          infoEl.textContent = "";
          return;
        }

        const parts = [currentDetectionContext.streetName || "Unknown street"];
        if (Number.isFinite(currentDetectionContext.streetBearing)) {
          parts.push(
            `Road: ${Math.round(
              normalizeBearingDegrees(currentDetectionContext.streetBearing),
            )}°`,
          );
        }

        const currentPov = detectionPanorama?.getPov?.();
        const viewHeading = Number.isFinite(currentPov?.heading)
          ? currentPov.heading
          : currentDetectionContext.heading;
        if (Number.isFinite(viewHeading)) {
          parts.push(
            `View: ${Math.round(normalizeBearingDegrees(viewHeading))}°`,
          );
        }

        infoEl.textContent = parts.join(" • ");
      }

      /**
       * Show detection for a given point index.
       */
      async function showDetectionForIndex(index) {
        const point = currentPoints[index];
        const panoId = currentPanoIds[index];

        if (!point || !panoId) return;

        // Store context for detection (pointIndex for position fallback)
        currentDetectionContext = {
          panoId,
          heading:
            (calculateHeadingWithSide(
              point.bearing,
              DEFAULT_SIDE,
              point.oneway,
            ) +
              180) %
            360,
          pointIndex: index,
          side: DEFAULT_SIDE,
          streetBearing: point.bearing,
          oneway: point.oneway || null,
          highway: point.highway || null,
          lanes: point.lanes || null,
          segmentStart: point.segmentStart || null,
          segmentEnd: point.segmentEnd || null,
          wayGeometry: point.wayGeometry || null,
          segmentIndex: point.segmentIndex ?? null,
          streetName: point.streetName || "Unknown street",
        };

        initPanoramaForContext();
      }

      /**
       * Re-run detection at current panorama POV (visible area only).
       */
      async function rerunDetection(mode = "sahi") {
        if (!currentDetectionContext || !detectionPanorama) return;

        const singleBtn = document.getElementById("detectSingleBtn");
        const sahiBtn = document.getElementById("detectSahiBtn");
        singleBtn.disabled = true;
        sahiBtn.disabled = true;

        // Single Overpass fetch for the entire visible map area.
        // This is reused by road-context lookup and curve rendering below,
        // eliminating all additional per-detection Overpass calls.
        const allWays = await fetchStreets(map.getBounds()).catch(() => []);
        _lastAllWays = allWays;
        console.log(`[rerunDetection] fetched ${allWays.length} ways for map bounds`);

        // Refresh road context if the panorama has moved to a different location
        const currentPano = detectionPanorama.getPano();
        const pos = detectionPanorama.getPosition?.();
        const curLat = pos?.lat?.();
        const curLng = pos?.lng?.();
        if (
          currentPano &&
          currentPano !== currentDetectionContext.panoId &&
          Number.isFinite(curLat) &&
          Number.isFinite(curLng)
        ) {
          currentDetectionContext = {
            ...currentDetectionContext,
            panoId: currentPano,
            // Clear stale road data so ensureDetectionRoadContext re-fetches
            streetBearing: undefined,
            segmentStart: null,
            segmentEnd: null,
            wayGeometry: null,
            segmentIndex: null,
            streetName: undefined,
          };
          await ensureDetectionRoadContext(curLat, curLng, allWays);
          updateDetectionInfoText();
        }

        const { panoId } = currentDetectionContext;
        const statusEl = document.getElementById("detectionStatus");

        try {
          // Use current POV (heading, pitch, zoom/FOV) for detection
          await runDetectionOnPanorama(panoId, null, statusEl, true, mode);

          // Project detected signs onto the map
          console.log(
            `rerunDetection: ${currentDetections.length} detections found, signMarkersLayer exists: ${!!signMarkersLayer}`,
          );
          console.log("=== DETECTION COMPLETE ===");
          currentDetections.forEach((det, i) => {
            console.log(
              `  Detection ${i}: heading=${det.heading.toFixed(1)}° pitch=${det.pitch.toFixed(1)}° conf=${det.confidence.toFixed(2)}`,
            );
          });
          if (currentDetections.length > 0) {
            try {
              await plotDetectedSigns(allWays);
            } catch (plotErr) {
              console.error("plotDetectedSigns error:", plotErr);
            }
          } else {
            console.log("No detections to plot");
          }
        } catch (err) {
          console.error("Re-detection failed:", err);
          statusEl.textContent = "Detection failed.";
        } finally {
          singleBtn.disabled = false;
          sahiBtn.disabled = false;
        }
      }

      /**
       * Plot the current panorama point and projected sign locations on the map.
       */
      async function plotDetectedSigns(allWays = null) {
        if (currentDetections.length === 0 || !currentDetectionContext) {
          console.warn("plotDetectedSigns: nothing to render");
          return;
        }

        const idx = currentDetectionContext?.pointIndex;
        const panoramaPosition = detectionPanorama?.getPosition?.();
        const panoramaLat = panoramaPosition?.lat?.();
        const panoramaLng = panoramaPosition?.lng?.();
        const sampledPoint =
          idx != null && currentPoints[idx] ? currentPoints[idx] : null;
        const cameraLat = Number.isFinite(panoramaLat)
          ? panoramaLat
          : (sampledPoint?.lat ?? INITIAL_LOCATION.lat);
        const cameraLng = Number.isFinite(panoramaLng)
          ? panoramaLng
          : (sampledPoint?.lon ?? INITIAL_LOCATION.lon);
        const cameraHeading = Number.isFinite(detectionPov?.heading)
          ? detectionPov.heading
          : currentDetectionContext?.heading ?? null;
        const roadContext =
          (await ensureDetectionRoadContext(cameraLat, cameraLng, allWays)) ||
          currentDetectionContext;
        const signLocations = estimateAllSignLocations(cameraLat, cameraLng, {
          streetBearing: roadContext.streetBearing,
          oneway: roadContext.oneway,
          side: roadContext.side ?? "right",
          highway: roadContext.highway || null,
          lanes: roadContext.lanes || null,
          wayGeometry: roadContext.wayGeometry || null,
          segmentIndex: roadContext.segmentIndex ?? null,
          segmentStart: roadContext.segmentStart || null,
          segmentEnd: roadContext.segmentEnd || null,
          cameraHeading,
        });
        const detectedPanoId =
          detectionPanorama?.getPano?.() || roadContext.panoId;
        const detectionEntry = {
          savedAt: Date.now(),
          source: "parksight",
          panoId: detectedPanoId,
          camera: {
            lat: cameraLat,
            lng: cameraLng,
          },
          heading: cameraHeading,
          streetBearing: roadContext.streetBearing,
          segmentStart: roadContext.segmentStart || null,
          segmentEnd: roadContext.segmentEnd || null,
          wayGeometry: roadContext.wayGeometry || null,
          segmentIndex: roadContext.segmentIndex ?? null,
          streetName: roadContext.streetName,
          signs: signLocations,
        };

        // ── Debug overlays ──
        if (debugOverlaysEnabled) {
          updateDebugMapOverlays();
          renderDebugDecompositionLines(signLocations, cameraLat, cameraLng);
        }

        const initialStore = appendSignMapDetection(detectionEntry);
        await renderSignMapData(initialStore, allWays);

        hydrateDetectionPreviews(signLocations, detectedPanoId)
          .then(async () => {
            const hydratedStore = appendSignMapDetection({
              ...detectionEntry,
              signs: signLocations,
            });
            await renderSignMapData(hydratedStore, allWays);
          })
          .catch((previewErr) => {
            console.warn("Sign preview hydration failed:", previewErr);
          });
      }

      function initPanoramaForContext() {
        if (!currentDetectionContext?.panoId) return;

        const statusEl = document.getElementById("detectionStatus");
        initDetectionPanorama(
          currentDetectionContext.panoId,
          currentDetectionContext.heading,
          document.getElementById("detectionPanorama"),
        );
        updateDetectionInfoText();
        if (typeof syncPanoramaCaptureSpotsOnMap === "function") {
          syncPanoramaCaptureSpotsOnMap();
        }
        statusEl.textContent = `Heading: ${Math.round(currentDetectionContext.heading)}°`;
      }

      // ── Consolidated state dump ──

      window._dump = function () {
        const state = {};

        try {
          const pov = detectionPanorama?.getPov?.() || {};
          const fov = Number.isFinite(pov.zoom) ? zoomToFov(pov.zoom) : null;
          const pos = detectionPanorama?.getPosition?.();
          const panoLat = pos?.lat?.();
          const panoLng = pos?.lng?.();

          state.timestamp = new Date().toISOString();
          state.panoId = detectionPanorama?.getPano?.() || null;
          state.pov = { heading: pov.heading, pitch: pov.pitch, zoom: pov.zoom };
          state.fov = fov;
          state.panoPosition = Number.isFinite(panoLat) ? { lat: panoLat, lng: panoLng } : null;

          state.context = currentDetectionContext
            ? {
                streetName: currentDetectionContext.streetName,
                streetBearing: currentDetectionContext.streetBearing,
                side: currentDetectionContext.side,
                oneway: currentDetectionContext.oneway,
                highway: currentDetectionContext.highway,
                lanes: currentDetectionContext.lanes,
                panoId: currentDetectionContext.panoId,
                heading: currentDetectionContext.heading,
              }
            : null;

          state.detections = currentDetections.map((d, i) => ({
            index: i,
            heading: d.heading,
            pitch: d.pitch,
            angularWidth: d.angularWidth,
            angularHeight: d.angularHeight,
            distanceAngularHeight: d.distanceAngularHeight,
            confidence: d.confidence,
            class_name: d.class_name,
          }));

          state.depth = currentDepthData;

          const dumpEl = document.getElementById("parksight-dump");
          const json = JSON.stringify(state, null, 2);
          if (dumpEl) {
            dumpEl.textContent = json;
            dumpEl.style.display = "block";
          }
          console.log("%c[parksight-dump]", "color:#4ade80;font-weight:bold", state);

          const apiUrl = window.DETECTION_CONFIG?.API_URL;
          if (apiUrl) {
            fetch(`${apiUrl}/dump`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: json,
            }).catch(() => {});
          }

          return state;
        } catch (err) {
          console.error("_dump() error:", err);
          return state;
        }
      };
    </script>
  </body>
</html>
