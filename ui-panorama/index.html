<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Parking - Calgary Tower Panorama</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000;
        }

        button {
            background: rgba(255,255,255,0.9);
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: white;
        }

        select {
            padding: 10px 12px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            background: rgba(255,255,255,0.9);
        }

        select:hover {
            background: white;
        }

        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2001;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #detectionPanorama {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #detectionOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #status {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 4px;
            z-index: 101;
        }

        #uiSwitcher {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2001;
        }

        #uiSwitcher select {
            padding: 10px 12px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            background: rgba(255,255,255,0.9);
        }

        #uiSwitcher select:hover {
            background: white;
        }
    </style>
</head>
<body>
    <div id="uiSwitcher">
        <select id="uiSelect" onchange="if(this.value) window.location.href=this.value">
            <option value="../ui-panorama/" selected>🔭 Panorama</option>
            <option value="../ui-map/">📍 Map</option>
            <option value="../ui-upload/">📤 Upload</option>
        </select>
    </div>

    <div id="controls">
        <select id="sideToggle">
            <option value="right">Right side</option>
            <option value="left">Left side</option>
        </select>
        <select id="detectMode">
            <option value="standard">Standard</option>
            <option value="sahi" selected>SAHI</option>
        </select>
        <button id="detectBtn">🔍 Detect</button>
    </div>

    <div id="detectionPanorama"></div>
    <svg id="detectionOverlay"></svg>
    <div id="status">Loading panorama...</div>

    <!-- Config and Modules -->
    <script src="/env.js"></script>
    <script src="../config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/panorama.js"></script>
    <script src="../js/streetview.js"></script>
    <script src="../js/detection.js"></script>

    <!-- Google Maps API -->
    <script>
        (function loadGoogleMapsAPI() {
            const apiKey = window.GOOGLE_CONFIG?.API_KEY;
            if (!apiKey) {
                console.error('Google API key not configured');
                return;
            }
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initApp`;
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        })();
    </script>

    <script>
        // 34 Vassar St, Boston
        const INITIAL_LOCATION = { lat: 42.3615, lon: -71.0921 };
        const BASE_HEADING = 90; // Facing east along 9 Ave

        let currentPanoId = null;
        let currentBaseHeading = BASE_HEADING;

        /**
         * Initialize the application after Google Maps API loads.
         */
        async function initApp() {
            const statusEl = document.getElementById('status');

            if (!window.GOOGLE_CONFIG?.API_KEY) {
                showError('Google API key not configured. Please add it to config.js');
                return;
            }

            try {
                // Get session token
                statusEl.textContent = 'Getting session...';
                const session = await getSessionToken();

                // Fetch panoId for Calgary Tower location
                statusEl.textContent = 'Finding Street View coverage...';
                const panoIds = await fetchPanoIds([INITIAL_LOCATION], session);

                if (!panoIds[0] || panoIds[0] === '') {
                    statusEl.textContent = 'No Street View coverage at this location';
                    return;
                }

                currentPanoId = panoIds[0];

                // Initialize panorama with side offset
                const container = document.getElementById('detectionPanorama');
                const side = document.getElementById('sideToggle').value;
                // Add 180° to look at the opposite side of the street
                const heading = (calculateHeadingWithSide(BASE_HEADING, side) + 180) % 360;
                initDetectionPanorama(currentPanoId, heading, container);

                statusEl.textContent = `Click "Detect" to scan (heading: ${Math.round(heading)}°)`;

            } catch (err) {
                console.error('Init error:', err);
                showError(`Failed to initialize: ${err.message}`);
            }
        }

        /**
         * Run detection on current view.
         */
        async function runDetect() {
            if (!currentPanoId) return;

            const statusEl = document.getElementById('status');
            const useSahi = document.getElementById('detectMode').value === 'sahi';

            try {
                await runDetectionOnPanorama(currentPanoId, null, statusEl, true, useSahi);
            } catch (err) {
                console.error('Detection failed:', err);
            }
        }

        // Event listeners
        document.getElementById('detectBtn').addEventListener('click', runDetect);

        // Side toggle - adjust panorama heading when changed
        document.getElementById('sideToggle').addEventListener('change', (e) => {
            if (!currentPanoId) return;
            const heading = (calculateHeadingWithSide(currentBaseHeading, e.target.value) + 180) % 360;
            initDetectionPanorama(currentPanoId, heading, document.getElementById('detectionPanorama'));
        });
    </script>
</body>
</html>
