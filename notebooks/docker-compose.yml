services:
  # Quick test - 1 epoch to verify setup
  test:
    build: .
    volumes:
      - ../datasets/parking-sign-detection-coco-dataset:/kaggle/input/parking-sign-detection-coco-dataset:ro
      - ./output:/kaggle/working/output
      - ./test_training.py:/kaggle/working/test_training.py:ro
    command: python /kaggle/working/test_training.py

  # Full notebook execution
  train:
    build: .
    volumes:
      - ../datasets/parking-sign-detection-coco-dataset:/kaggle/input/parking-sign-detection-coco-dataset:ro
      - ./output:/kaggle/working/output
      - ./parking_sign_training.ipynb:/kaggle/working/parking_sign_training.ipynb:ro
    command: >
      jupyter nbconvert --to notebook --execute
      --ExecutePreprocessor.timeout=3600
      /kaggle/working/parking_sign_training.ipynb
      --output /kaggle/working/output/executed_notebook.ipynb
